<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    /* ── Auth Ekranı ── */
    #authScreen {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
      overflow: hidden;
    }

    .auth-header {
      background: #4f46e5;
      padding: 28px 24px 20px;
      color: #fff;
      text-align: center;
    }

    .auth-header h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .auth-header p  { font-size: 13px; opacity: .8; }

    .auth-tabs {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
    }

    .auth-tab {
      flex: 1;
      padding: 13px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all .15s;
    }

    .auth-tab.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .auth-body { padding: 24px; }

    .auth-body label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 5px;
    }

    .auth-body input[type="email"],
    .auth-body input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 14px;
    }

    .auth-body input:focus { border-color: #4f46e5; }

    .auth-submit {
      width: 100%;
      padding: 11px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }

    .auth-submit:hover  { background: #4338ca; }
    .auth-submit:disabled { background: #a5b4fc; cursor: default; }

    .auth-msg {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .auth-msg.error   { background: #fee2e2; color: #b91c1c; display: block; }
    .auth-msg.success { background: #d1fae5; color: #065f46; display: block; }

    /* ── Onay Bekle Ekranı ── */
    #confirmScreen {
      display: none;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 380px;
      padding: 40px 28px;
      text-align: center;
    }

    #confirmScreen .icon { font-size: 48px; margin-bottom: 16px; }
    #confirmScreen h2   { font-size: 18px; font-weight: 700; color: #1f2937; margin-bottom: 8px; }
    #confirmScreen p    { font-size: 14px; color: #6b7280; line-height: 1.5; }

    #confirmScreen .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #4f46e5;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
    }

    /* ── App Ekranı ── */
    #appScreen {
      display: none;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      padding: 20px 24px;
      color: #fff;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .header-top h1  { font-size: 20px; font-weight: 700; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      opacity: .85;
    }

    .logout-btn {
      background: rgba(255,255,255,.2);
      border: none;
      color: #fff;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background .15s;
    }

    .logout-btn:hover { background: rgba(255,255,255,.35); }

    .input-row { display: flex; gap: 8px; }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .input-row button {
      padding: 10px 18px;
      background: #fff;
      color: #4f46e5;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    .input-row button:hover    { background: #e0e7ff; }
    .input-row button:disabled { opacity: .5; cursor: default; }

    .filters {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all .15s;
    }

    .filter-btn.active              { color: #4f46e5; border-bottom-color: #4f46e5; }
    .filter-btn:hover:not(.active)  { color: #374151; }

    .todo-list { list-style: none; min-height: 80px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background .1s;
    }

    .todo-item:last-child   { border-bottom: none; }
    .todo-item:hover        { background: #fafafa; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #1f2937;
      word-break: break-word;
    }

    .todo-text.done { text-decoration: line-through; color: #9ca3af; }

    .actions { display: flex; gap: 4px; flex-shrink: 0; }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 4px;
      line-height: 1;
      transition: color .15s, background .15s;
    }

    .edit-btn   { color: #d1d5db; }
    .edit-btn:hover { color: #4f46e5; background: #e0e7ff; }

    .delete-btn { color: #d1d5db; font-size: 18px; }
    .delete-btn:hover { color: #ef4444; }

    .todo-item.editing .todo-text          { display: none; }
    .todo-item.editing .actions            { display: none; }
    .todo-item.editing input[type="checkbox"] { display: none; }

    .edit-input {
      display: none;
      flex: 1;
      padding: 5px 10px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .todo-item.editing .edit-input { display: block; }

    .save-btn {
      display: none;
      padding: 5px 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .todo-item.editing .save-btn { display: block; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    .footer {
      padding: 12px 20px;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background .15s;
    }

    .clear-btn:hover    { background: #fee2e2; }
    .clear-btn:disabled { color: #d1d5db; cursor: default; background: none; }
  </style>
</head>
<body>

  <!-- AUTH EKRANI -->
  <div id="authScreen">
    <div class="auth-header">
      <h1>Yapılacaklar</h1>
      <p>Devam etmek için giriş yapın</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin"  onclick="switchTab('login')">Giriş Yap</button>
      <button class="auth-tab"        id="tabSignup" onclick="switchTab('signup')">Kayıt Ol</button>
    </div>

    <div class="auth-body">
      <label>E-posta</label>
      <input type="email" id="authEmail" placeholder="ornek@mail.com" />

      <label>Şifre</label>
      <input type="password" id="authPassword" placeholder="En az 6 karakter" />

      <button class="auth-submit" id="authSubmit" onclick="handleAuth()">Giriş Yap</button>
      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>

  <!-- ONAY BEKLEME EKRANI -->
  <div id="confirmScreen">
    <div class="icon">📧</div>
    <h2>E-postanı onayla</h2>
    <p>Kayıt olduğun adrese bir onay bağlantısı gönderdik.<br>
       Bağlantıya tıkladıktan sonra giriş yapabilirsin.</p>
    <button class="back-link" onclick="showAuth()">Giriş ekranına dön</button>
  </div>

  <!-- UYGULAMA EKRANI -->
  <div id="appScreen">
    <div class="header">
      <div class="header-top">
        <h1>Yapılacaklar</h1>
        <div class="user-info">
          <span id="userEmail"></span>
          <button class="logout-btn" onclick="logout()">Çıkış</button>
        </div>
      </div>
      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
        <button id="addBtn" onclick="addTodo()">Ekle</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn"        onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn"        onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="counter">0 görev kaldı</span>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    /* ── Supabase Config ── */
    const SB_URL = 'https://uficvhmycipofqiawvaa.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmaWN2aG15Y2lwb2ZxaWF3dmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODIsImV4cCI6MjA5MjI4NTA4Mn0.vVvD_9oEHshyFpga1pyuLeFseOGy5TqDp1Rnidy40h8';

    /* ── State ── */
    let session = null;   // { access_token, refresh_token, user }
    let todos   = [];
    let filter  = 'all';
    let authMode = 'login';  // 'login' | 'signup'

    /* ── Generic fetch helpers ── */
    async function sbFetch(path, opts = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        ...(opts.headers || {})
      };
      if (session) headers['Authorization'] = `Bearer ${session.access_token}`;
      const res = await fetch(`${SB_URL}${path}`, { ...opts, headers });
      const text = await res.text();
      const data = text ? JSON.parse(text) : null;
      if (!res.ok) throw data || { message: 'İstek başarısız' };
      return data;
    }

    async function dbFetch(path, opts = {}) {
      const headers = { 'Prefer': 'return=representation', ...(opts.headers || {}) };
      return sbFetch(`/rest/v1/${path}`, { ...opts, headers });
    }

    /* ══════════════════════════════
       AUTH
    ══════════════════════════════ */
    function switchTab(mode) {
      authMode = mode;
      document.getElementById('tabLogin').classList.toggle('active',  mode === 'login');
      document.getElementById('tabSignup').classList.toggle('active', mode === 'signup');
      document.getElementById('authSubmit').textContent = mode === 'login' ? 'Giriş Yap' : 'Kayıt Ol';
      clearMsg();
    }

    function clearMsg() {
      const el = document.getElementById('authMsg');
      el.className = 'auth-msg';
      el.textContent = '';
    }

    function showMsg(text, type) {
      const el = document.getElementById('authMsg');
      el.className = `auth-msg ${type}`;
      el.textContent = text;
    }

    async function handleAuth() {
      const email    = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;
      if (!email || !password) { showMsg('E-posta ve şifre gereklidir.', 'error'); return; }

      const btn = document.getElementById('authSubmit');
      btn.disabled = true;
      clearMsg();

      try {
        if (authMode === 'login') {
          const data = await sbFetch('/auth/v1/token?grant_type=password', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });
          setSession(data);
          await loadTodos();
          showApp();
        } else {
          // Kayıt: redirect URL'i GitHub Pages'e yönlendir
          const redirectTo = 'https://umituludogan1-arch.github.io/todo-app/';
          await sbFetch(`/auth/v1/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password, options: { emailRedirectTo: redirectTo } })
          });
          showConfirm();
        }
      } catch (err) {
        const msg = err?.error_description || err?.message || err?.msg || 'Bir hata oluştu.';
        showMsg(msg, 'error');
      } finally {
        btn.disabled = false;
      }
    }

    function setSession(data) {
      session = {
        access_token:  data.access_token,
        refresh_token: data.refresh_token,
        user: data.user
      };
      localStorage.setItem('sb_session', JSON.stringify(session));
    }

    async function logout() {
      try {
        await sbFetch('/auth/v1/logout', { method: 'POST' });
      } catch (_) {}
      session = null;
      todos   = [];
      localStorage.removeItem('sb_session');
      showAuth();
    }

    async function refreshSession() {
      try {
        const data = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
          method: 'POST',
          body: JSON.stringify({ refresh_token: session.refresh_token })
        });
        setSession(data);
        return true;
      } catch (_) {
        return false;
      }
    }

    /* ── Screen helpers ── */
    function showAuth() {
      document.getElementById('authScreen').style.display    = '';
      document.getElementById('confirmScreen').style.display = 'none';
      document.getElementById('appScreen').style.display     = 'none';
    }

    function showConfirm() {
      document.getElementById('authScreen').style.display    = 'none';
      document.getElementById('confirmScreen').style.display = '';
      document.getElementById('appScreen').style.display     = 'none';
    }

    function showApp() {
      document.getElementById('authScreen').style.display    = 'none';
      document.getElementById('confirmScreen').style.display = 'none';
      document.getElementById('appScreen').style.display     = '';
      document.getElementById('userEmail').textContent = session?.user?.email || '';
    }

    /* ── URL hash: onay sonrası geri dönüş ── */
    async function handleCallback() {
      const hash   = window.location.hash.slice(1);
      const params = new URLSearchParams(hash);
      const accessToken  = params.get('access_token');
      const refreshToken = params.get('refresh_token');
      const type         = params.get('type');

      if (accessToken && type === 'signup') {
        // Önce user bilgisini çek
        session = { access_token: accessToken, refresh_token: refreshToken };
        try {
          const user = await sbFetch('/auth/v1/user');
          session.user = user;
          localStorage.setItem('sb_session', JSON.stringify(session));
          window.history.replaceState(null, '', window.location.pathname);
          await loadTodos();
          showApp();
          return true;
        } catch (_) {}
      }
      return false;
    }

    /* ══════════════════════════════
       TODOS
    ══════════════════════════════ */
    async function loadTodos() {
      document.getElementById('todoList').innerHTML = '<div class="empty">Yükleniyor...</div>';
      todos = await dbFetch('todos?select=*&order=created_at.asc');
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done')   return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Görev yok</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item" id="item-${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="todo-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
            <input class="edit-input" type="text" value="${escHtml(t.text)}"
              onkeydown="handleEditKey(event,${t.id})" />
            <button class="save-btn" onclick="saveEdit(${t.id})">Kaydet</button>
            <div class="actions">
              <button class="edit-btn"    onclick="startEdit(${t.id})" title="Düzenle">&#9998;</button>
              <button class="delete-btn"  onclick="remove(${t.id})"    title="Sil">&times;</button>
            </div>
          </li>`).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('counter').textContent = `${remaining} görev kaldı`;
      document.getElementById('clearBtn').disabled = !todos.some(t => t.done);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text  = input.value.trim();
      if (!text) return;
      input.value = '';
      document.getElementById('addBtn').disabled = true;
      const [row] = await dbFetch('todos', {
        method: 'POST',
        body: JSON.stringify({ text, done: false, user_id: session.user.id })
      });
      todos.push(row);
      render();
      document.getElementById('addBtn').disabled = false;
    }

    function startEdit(id) {
      const li = document.getElementById('item-' + id);
      if (!li) return;
      li.classList.add('editing');
      const inp = li.querySelector('.edit-input');
      inp.focus(); inp.select();
    }

    async function saveEdit(id) {
      const li = document.getElementById('item-' + id);
      if (!li) return;
      const newText = li.querySelector('.edit-input').value.trim();
      if (!newText) return;
      await dbFetch(`todos?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ text: newText })
      });
      const t = todos.find(t => t.id === id);
      if (t) t.text = newText;
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter')  saveEdit(id);
      if (e.key === 'Escape') render();
    }

    async function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t.done = !t.done;
      render();
      await dbFetch(`todos?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ done: t.done })
      });
    }

    async function remove(id) {
      todos = todos.filter(t => t.id !== id);
      render();
      await dbFetch(`todos?id=eq.${id}`, { method: 'DELETE' });
    }

    async function clearDone() {
      const ids = todos.filter(t => t.done).map(t => t.id);
      if (!ids.length) return;
      todos = todos.filter(t => !t.done);
      render();
      await dbFetch(`todos?id=in.(${ids.join(',')})`, { method: 'DELETE' });
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    /* ══════════════════════════════
       BAŞLANGIÇ: oturum kontrolü
    ══════════════════════════════ */
    (async () => {
      // 1. Onay e-postasından gelen hash'i kontrol et
      const handled = await handleCallback();
      if (handled) return;

      // 2. Kayıtlı oturum var mı?
      const saved = localStorage.getItem('sb_session');
      if (saved) {
        session = JSON.parse(saved);
        // Token hâlâ geçerli mi?
        try {
          const user = await sbFetch('/auth/v1/user');
          session.user = user;
          await loadTodos();
          showApp();
          return;
        } catch (_) {
          // Token süresi dolmuş olabilir, yenile
          const ok = await refreshSession();
          if (ok) {
            try {
              await loadTodos();
              showApp();
              return;
            } catch (_) {}
          }
        }
      }

      // 3. Giriş ekranını göster
      showAuth();
    })();
  </script>
</body>
</html>
