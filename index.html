<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: #4f46e5;
      padding: 24px;
      color: #fff;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .input-row button {
      padding: 10px 18px;
      background: #fff;
      color: #4f46e5;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #e0e7ff;
    }

    .filters {
      display: flex;
      border-bottom: 1px solid #e5e7eb;
    }

    .filter-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn.active {
      color: #4f46e5;
      border-bottom-color: #4f46e5;
    }

    .filter-btn:hover:not(.active) {
      color: #374151;
    }

    .todo-list {
      list-style: none;
      min-height: 80px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-bottom: 1px solid #f3f4f6;
      transition: background 0.1s;
    }

    .todo-item:last-child {
      border-bottom: none;
    }

    .todo-item:hover {
      background: #fafafa;
    }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-text {
      flex: 1;
      font-size: 14px;
      color: #1f2937;
      word-break: break-word;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #9ca3af;
    }

    .actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .edit-btn, .delete-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      padding: 3px 7px;
      border-radius: 4px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .edit-btn {
      color: #d1d5db;
    }

    .edit-btn:hover {
      color: #4f46e5;
      background: #e0e7ff;
    }

    .delete-btn {
      color: #d1d5db;
      font-size: 18px;
    }

    .delete-btn:hover {
      color: #ef4444;
    }

    .todo-item.editing .todo-text { display: none; }
    .todo-item.editing .actions { display: none; }
    .todo-item.editing input[type="checkbox"] { display: none; }

    .edit-input {
      display: none;
      flex: 1;
      padding: 5px 10px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }

    .todo-item.editing .edit-input { display: block; }

    .save-btn {
      display: none;
      padding: 5px 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    .todo-item.editing .save-btn { display: block; }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #9ca3af;
      font-size: 14px;
    }

    .footer {
      padding: 12px 20px;
      background: #f9fafb;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #6b7280;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .clear-btn:hover {
      background: #fee2e2;
    }

    .clear-btn:disabled {
      color: #d1d5db;
      cursor: default;
      background: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Yapılacaklar</h1>
      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
        <button onclick="addTodo()">Ekle</button>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Tümü</button>
      <button class="filter-btn" onclick="setFilter('active', this)">Aktif</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="footer">
      <span id="counter">0 görev kaldı</span>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://uficvhmycipofqiawvaa.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVmaWN2aG15Y2lwb2ZxaWF3dmFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDkwODIsImV4cCI6MjA5MjI4NTA4Mn0.vVvD_9oEHshyFpga1pyuLeFseOGy5TqDp1Rnidy40h8';

    const headers = {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    async function api(path, options = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        headers: { ...headers, ...(options.headers || {}) },
        ...options
      });
      if (!res.ok) throw new Error(await res.text());
      const text = await res.text();
      return text ? JSON.parse(text) : [];
    }

    async function loadTodos() {
      setLoading(true);
      todos = await api('todos?select=*&order=created_at.asc');
      render();
      setLoading(false);
    }

    function setLoading(on) {
      document.getElementById('todoList').innerHTML = on
        ? '<div class="empty">Yükleniyor...</div>' : '';
    }

    function render() {
      const list = document.getElementById('todoList');
      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">Görev yok</div>';
      } else {
        list.innerHTML = filtered.map(t => `
          <li class="todo-item" id="item-${t.id}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="todo-text ${t.done ? 'done' : ''}">${escHtml(t.text)}</span>
            <input class="edit-input" type="text" value="${escHtml(t.text)}"
              onkeydown="handleEditKey(event, ${t.id})" />
            <button class="save-btn" onclick="saveEdit(${t.id})">Kaydet</button>
            <div class="actions">
              <button class="edit-btn" onclick="startEdit(${t.id})" title="Düzenle">&#9998;</button>
              <button class="delete-btn" onclick="remove(${t.id})" title="Sil">&times;</button>
            </div>
          </li>
        `).join('');
      }

      const remaining = todos.filter(t => !t.done).length;
      document.getElementById('counter').textContent = `${remaining} görev kaldı`;

      const hasDone = todos.some(t => t.done);
      document.getElementById('clearBtn').disabled = !hasDone;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const [row] = await api('todos', {
        method: 'POST',
        body: JSON.stringify({ text, done: false })
      });
      todos.push(row);
      render();
    }

    function startEdit(id) {
      const li = document.getElementById('item-' + id);
      if (!li) return;
      li.classList.add('editing');
      const input = li.querySelector('.edit-input');
      input.focus();
      input.select();
    }

    async function saveEdit(id) {
      const li = document.getElementById('item-' + id);
      if (!li) return;
      const newText = li.querySelector('.edit-input').value.trim();
      if (!newText) return;
      await api(`todos?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ text: newText })
      });
      const t = todos.find(t => t.id === id);
      if (t) t.text = newText;
      render();
    }

    function handleEditKey(e, id) {
      if (e.key === 'Enter') saveEdit(id);
      if (e.key === 'Escape') render();
    }

    async function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      t.done = !t.done;
      render();
      await api(`todos?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({ done: t.done })
      });
    }

    async function remove(id) {
      todos = todos.filter(t => t.id !== id);
      render();
      await api(`todos?id=eq.${id}`, { method: 'DELETE' });
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      todos = todos.filter(t => !t.done);
      render();
      await api(`todos?id=in.(${doneIds.join(',')})`, { method: 'DELETE' });
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    loadTodos();
  </script>
</body>
</html>
